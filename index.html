.typing{display:flex;gap:4px;padding:12px 14px;background:#fff;border-radius:14px;border:1px solid #E1EEF6;align-self:flex-start}
.typing span{width:7px;height:7px;background:#90A4AE;border-radius:50%;animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

// в•җв•җв•җ STORAGE + API в•җв•җв•җ
function sg(k,def=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

async function apiCall(action,body={}){
  if(!ST.apiUrl)return null;
  try{
    // text/plain avoids CORS preflight; Apps Script reads via e.postData.contents
    const res=await fetch(ST.apiUrl,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action,...body}),
      redirect:"follow"
    });
    const text=await res.text();
    return JSON.parse(text);
  }catch(e){console.warn("API error:",e);return null;}
}
async function apiGet(){
  if(!ST.apiUrl)return null;
  try{
    const res=await fetch(ST.apiUrl,{redirect:"follow"});
    const text=await res.text();
    return JSON.parse(text);
  }catch(e){console.warn("API GET error:",e);return null;}
}

function showSync(msg){
  let el=document.getElementById("syncBar");
  if(!el){el=document.createElement("div");el.id="syncBar";el.className="sync";document.body.appendChild(el);}
  el.textContent=msg;el.classList.remove("hide");
  if(msg.includes("вң“"))setTimeout(()=>el.classList.add("hide"),2000);
}

async function loadAll(){
  ST.apiUrl=sg("t26_api","")||DEPLOY_API_URL||"";
  // Load local first
  ST.exps=sg("t26_ex",[]);ST.done=sg("t26_dn",{});ST.notes=sg("t26_nt",{});
  ST.extra=sg("t26_xtr",{});ST.rates=sg("t26_rt",{JPY:0.222,KRW:0.0233});
  ST.albumUrl=sg("t26_alb","")||DEPLOY_ALBUM_URL;ST.travelers=sg("t26_trv",ST.travelers)||ST.travelers;
  ST.budgetItems=sg("t26_bgt",null);
  render();
  // Then load from API
  if(ST.apiUrl){
    showSync("вҸі еҗҢжӯҘдёӯвҖҰ");
    const r=await apiGet();
    if(r&&r.ok&&r.data){
      const d=r.data;
      if(d.expenses){ST.exps=d.expenses;ls("t26_ex",d.expenses);}
      if(d.notes&&Object.keys(d.notes).length){ST.notes=d.notes;ls("t26_nt",d.notes);}
      if(d.done&&Object.keys(d.done).length){ST.done=d.done;ls("t26_dn",d.done);}
      if(d.config){
        if(d.config.albumUrl)ST.albumUrl=d.config.albumUrl;
        if(d.config.rates)try{ST.rates=JSON.parse(d.config.rates);}catch{}
      }
      if(d.budget&&d.budget.length){ST.budgetItems=d.budget;ls("t26_bgt",d.budget);}
      showSync("вң“ е·ІеҗҢжӯҘ");render();
    } else showSync("вҡ пёҸ еҗҢжӯҘеӨұж•—пјҢдҪҝз”Ёжң¬ең°иіҮж–ҷ");
  }
}

function set(k,v,sync=true){
  ST[k]=v;
  const LK={exps:"t26_ex",done:"t26_dn",notes:"t26_nt",extra:"t26_xtr",rates:"t26_rt",albumUrl:"t26_alb",travelers:"t26_trv",budgetItems:"t26_bgt"};
  if(LK[k])ls(LK[k],v);
  render();
  if(!sync||!ST.apiUrl)return;

  if(k==="albumUrl")apiCall("set_config",{key:"albumUrl",value:v});
  if(k==="rates")apiCall("set_config",{key:"rates",value:JSON.stringify(v)});
  if(k==="budgetItems")apiCall("update_budget",{items:v});
}

// в•җв•җв•җ LEAFLET MAP в•җв•җв•җ
let mapInst=null,mapCurDay=null;
function buildMap(day){
  // Always destroy old map first
  if(mapInst){try{mapInst.off();mapInst.remove();}catch(e){}mapInst=null;}
  const el=document.getElementById("mapEl");
  if(!el)return;
  // Set height via JS (more reliable than CSS calc)
  // Height is now set by flex:1 in CSS вҖ” just ensure Leaflet knows the size
  mapCurDay=day;
  const isAll=day==="all";
  const AS=allSpots();
  const pts=(isAll?AS:(SPOTS[Number(day)]||[]).map(s=>({...s,day:Number(day)}))).filter(s=>s.lat&&s.lng);
  if(!pts.length)return;
  try{
    const map=L.map(el,{zoomControl:true,attributionControl:true});
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"В© OSM",maxZoom:18}).addTo(map);
    function route(arr,col){
      const v=arr.filter(s=>s.lat&&s.lng);
      for(let i=0;i<v.length-1;i++){
        L.polyline([[v[i].lat,v[i].lng],[v[i+1].lat,v[i+1].lng]],{color:col,weight:3.5,dashArray:"7,4",opacity:.85}).addTo(map);
        const ang=Math.atan2(v[i+1].lng-v[i].lng,v[i+1].lat-v[i].lat)*(180/Math.PI);
        const ml=[(v[i].lat+v[i+1].lat)/2,(v[i].lng+v[i+1].lng)/2];
        L.marker(ml,{icon:L.divIcon({className:"",html:`<span style="transform:rotate(${-ang+90}deg);display:block;font-size:13px;color:${col};text-shadow:0 0 3px #fff;line-height:1">в–¶</span>`,iconSize:[13,13],iconAnchor:[6,6]}),interactive:false}).addTo(map);
      }
    }
    if(isAll){for(let d=1;d<=10;d++)route(AS.filter(s=>s.day===d&&s.lat&&s.lng),DC[d]||"#0277BD");}
    else route(pts,DC[Number(day)]||"#0277BD");
    let sn2=0;
    pts.forEach(sp=>{
      const c=DC[sp.day]||"#0277BD",isH=["T","F","FT"].includes(sp.t);
      if(!isH)sn2++;
      const lbl=isH?({F:"F",T:"T",FT:"F/T"}[sp.t]||"H"):(isAll?`D${sp.day}`:String(sn2));
      const sz=isH?28:24;
      const ic=L.divIcon({className:"",html:`<div style="width:${sz}px;height:${sz}px;background:${isH?c+"99":c};border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${isH?9:10}px;font-weight:700;color:#fff;box-shadow:0 1px 6px rgba(0,0,0,.25)">${lbl}</div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],popupAnchor:[0,-sz/2]});
      const burl=sp.hk?BOOKING[sp.hk]:"";
      L.marker([sp.lat,sp.lng],{icon:ic}).addTo(map).bindPopup(`<div style="font-size:13px;font-family:'DM Sans',sans-serif;min-width:170px"><div style="font-size:10px;color:${c};font-weight:700;margin-bottom:2px">Day${sp.day} ${DM2[sp.day]||""} В· ${DT[(sp.day||1)-1]}</div><div style="font-weight:600;font-size:14px;margin-bottom:4px">${sp.nm}</div>${sp.hours?`<div>рҹ•җ ${sp.hours}</div>`:""}${sp.price?`<div style="color:#0277BD;font-weight:600">рҹ’° ${sp.price}</div>`:""}${sp.note?`<div style="color:#546E7A;font-size:11px;margin-top:2px">${sp.note}</div>`:""}<div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap">${sp.gmap?`<a href="${sp.gmap}" target="_blank" style="background:#4285F4;color:#fff;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;text-decoration:none">Google</a>`:""}${sp.naver?`<a href="${sp.naver}" target="_blank" style="background:#03C75A;color:#fff;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;text-decoration:none">Naver</a>`:""}${burl?`<a href="${burl}" target="_blank" style="background:${c};color:#fff;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;text-decoration:none">иЁӮе–®</a>`:""}</div></div>`,{maxWidth:280});
    });
    const bounds=pts.map(s=>[s.lat,s.lng]);
    if(bounds.length)map.fitBounds(bounds,{padding:[44,44],maxZoom:isAll?5:12});
    mapInst=map;
    setTimeout(()=>{try{map.invalidateSize();}catch(e){}},300);
  }catch(e){console.error("Map error:",e);}
}

function saveBudgetEdit(id){
  const items=getBudgetItems().map(it=>{

      paid:"paid" in d?d.paid:it.paid

}
