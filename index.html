<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#F5F0E8;color:#2C2420;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
/* ── Font stack: Noto Sans TC 繁中 + Playfair headers ── */
body,input,textarea,select,button{

}
::-webkit-scrollbar{width:0;height:0}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;background:#F5F0E8}

/* Header — warm terracotta gradient */
.header{flex-shrink:0;
  background:linear-gradient(135deg,#B8826A 0%,#C8957A 50%,#BFA082 100%);
  color:#fff;padding:13px 16px 11px;position:relative}
.header h1{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;line-height:1.3;letter-spacing:.01em;text-shadow:0 1px 3px rgba(0,0,0,.15)}
.header .sub{font-size:12px;opacity:.75;margin-top:2px;letter-spacing:.04em}
.header .cntdown{position:absolute;right:16px;top:13px;text-align:right}
.header .num{font-family:'Playfair Display',serif;font-size:30px;font-weight:600;line-height:1;text-shadow:0 1px 3px rgba(0,0,0,.15)}
.header .lbl{font-size:11px;opacity:.65;letter-spacing:.04em}

/* Main */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#F5F0E8}
.main.map-active{overflow:hidden}

/* Nav — warm parchment */
.nav{flex-shrink:0;display:flex;background:#F5F0E8;border-top:1px solid #E0D8CC;
  padding-bottom:env(safe-area-inset-bottom)}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px 4px;border:none;background:none;cursor:pointer;color:#C0A898;
  font-size:11px;font-family:'Noto Sans TC',sans-serif;min-height:54px;letter-spacing:.02em}
.nav button.act{color:#B8826A;font-weight:600}
.nav button .ic{font-size:23px;line-height:1}

/* Cards */
.card{background:#fff;border-radius:14px;border:1px solid #E8E2D6;overflow:hidden;
  margin-bottom:10px;box-shadow:0 2px 8px rgba(44,36,32,.07)}
.card-top{height:3px}
.card-body{padding:13px 15px}

/* Pill badge */
.pill{display:inline-flex;align-items:center;font-size:12px;font-weight:600;
  padding:3px 10px;border-radius:20px;letter-spacing:.02em}

/* Primary button */
.btn-p{background:#B8826A;color:#fff;border:none;border-radius:22px;padding:11px 22px;
  font-size:15px;font-weight:600;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;min-height:46px;
  display:inline-flex;align-items:center;gap:5px;letter-spacing:.02em;
  box-shadow:0 2px 8px rgba(184,130,106,.3)}
/* Ghost button */
.btn-g{background:none;border:1.5px solid #E0D8CC;border-radius:22px;padding:10px 18px;
  font-size:15px;color:#7A6A5A;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;min-height:46px}

/* Input */
.inp{border:1.5px solid #E0D8CC;border-radius:10px;padding:11px 14px;font-size:16px;
  font-family:'Noto Sans TC',sans-serif;background:#FAF7F2;width:100%;
  outline:none;color:#2C2420;-webkit-appearance:none}
.inp:focus{border-color:#C8957A;outline:none}

/* Tag */
.tag{font-size:12px;font-weight:600;padding:3px 9px;border-radius:12px;display:inline-block}
.section{padding:15px 16px}

/* Itinerary day pills */
.dayrow{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:5px;scrollbar-width:none}
.daypill{flex-shrink:0;min-width:60px;padding:7px 6px;border-radius:12px;
  border:2px solid transparent;background:#fff;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  min-height:56px;box-shadow:0 1px 5px rgba(44,36,32,.08)}

/* Spot card */
.spot{background:#fff;border-radius:12px;border:1px solid #E8E2D6;padding:13px 14px;
  margin-bottom:9px;box-shadow:0 1px 6px rgba(44,36,32,.06)}
.spot-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}

/* Map links */
.mpill{padding:6px 13px;border-radius:20px;font-size:13px;font-weight:600;color:#fff;
  text-decoration:none;display:inline-flex;align-items:center;gap:4px;min-height:38px}

/* Chat */
.chat-wrap{display:flex;flex-direction:column;height:calc(100dvh - 135px)}
.chat-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 15px;display:flex;flex-direction:column;gap:10px}
.bubble{padding:11px 15px;border-radius:14px;font-size:15px;line-height:1.6;
  max-width:85%;word-break:break-word}
.bubble.u{background:#B8826A;color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.bubble.a{background:#fff;border:1px solid #E8E2D6;color:#2C2420;
  border-bottom-left-radius:4px;align-self:flex-start}
.typing{display:flex;gap:4px;padding:12px 14px;background:#fff;border-radius:14px;
  border:1px solid #E8E2D6;align-self:flex-start}
.typing span{width:7px;height:7px;background:#C0A898;border-radius:50%;animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(60,40,30,.35);display:flex;
  align-items:flex-end;justify-content:center;z-index:999;backdrop-filter:blur(3px)}
.modal{background:#FAF7F2;border-radius:20px 20px 0 0;padding:22px 16px;width:100%;
  padding-bottom:calc(22px + env(safe-area-inset-bottom));max-height:88vh;
  overflow-y:auto;border-top:1px solid #E8E2D6}

/* Sync bar */
.sync{position:fixed;top:0;left:50%;transform:translateX(-50%);background:#B8826A;
  color:#fff;font-size:13px;padding:7px 18px;border-radius:0 0 12px 12px;
  z-index:9999;transition:opacity .3s}
.sync.hide{opacity:0;pointer-events:none}

/* Section label 小標 */
.sec-label{font-size:12px;font-weight:700;color:#C0A898;letter-spacing:.1em;
  text-transform:uppercase;margin-bottom:9px;margin-top:20px}
</style>
</head>

// ═══ STORAGE + API ═══
function sg(k,def=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

async function apiCall(action,body={}){
  if(!ST.apiUrl)return null;
  try{
    // text/plain avoids CORS preflight; Apps Script reads via e.postData.contents
    const res=await fetch(ST.apiUrl,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action,...body}),
      redirect:"follow"
    });
    const text=await res.text();
    return JSON.parse(text);
  }catch(e){console.warn("API error:",e);return null;}
}
async function apiGet(){
  if(!ST.apiUrl)return null;
  try{
    const res=await fetch(ST.apiUrl,{redirect:"follow"});
    const text=await res.text();
    return JSON.parse(text);
  }catch(e){console.warn("API GET error:",e);return null;}
}

function showSync(msg){
  let el=document.getElementById("syncBar");
  if(!el){el=document.createElement("div");el.id="syncBar";el.className="sync";document.body.appendChild(el);}
  el.textContent=msg;el.classList.remove("hide");
  if(msg.includes("✓"))setTimeout(()=>el.classList.add("hide"),2000);
}

async function loadAll(){
  ST.apiUrl=sg("t26_api","")||DEPLOY_API_URL||"";
  // Load local first
  ST.exps=sg("t26_ex",[]);ST.done=sg("t26_dn",{});ST.notes=sg("t26_nt",{});
  ST.extra=sg("t26_xtr",{});ST.rates=sg("t26_rt",{JPY:0.222,KRW:0.0233});
  ST.albumUrl=sg("t26_alb","")||DEPLOY_ALBUM_URL;ST.travelers=sg("t26_trv",ST.travelers)||ST.travelers;
  ST.budgetItems=sg("t26_bgt",null);
  render();
  // Then load from API
  if(ST.apiUrl){
    const dot2=document.getElementById("syncDot");if(dot2)dot2.style.background="#B8A890";
    const r=await apiGet();
    if(r&&r.ok&&r.data){
      const d=r.data;
      if(d.expenses){ST.exps=d.expenses;ls("t26_ex",d.expenses);}
      if(d.notes&&Object.keys(d.notes).length){ST.notes=d.notes;ls("t26_nt",d.notes);}
      if(d.done&&Object.keys(d.done).length){ST.done=d.done;ls("t26_dn",d.done);}
      if(d.config){
        if(d.config.albumUrl)ST.albumUrl=d.config.albumUrl;
        if(d.config.rates)try{ST.rates=JSON.parse(d.config.rates);}catch{}
      }
      if(d.budget&&d.budget.length){ST.budgetItems=d.budget;ls("t26_bgt",d.budget);}
      const dot3=document.getElementById("syncDot");if(dot3){dot3.style.background="#4CAF50";dot3.title="已同步";}render();
    } else {
      // 靜默降級：不跳警告，只更新 header 小點
      const dot=document.getElementById("syncDot");
      if(dot){dot.title="同步失敗，使用本地資料";dot.style.background="#FFA726";}
    }
  }
}

function set(k,v,sync=true){
  ST[k]=v;
  const LK={exps:"t26_ex",done:"t26_dn",notes:"t26_nt",extra:"t26_xtr",rates:"t26_rt",albumUrl:"t26_alb",travelers:"t26_trv",budgetItems:"t26_bgt"};
  if(LK[k])ls(LK[k],v);
  render();
  if(!sync||!ST.apiUrl)return;
  // API sync for shared data
  if(k==="albumUrl")apiCall("set_config",{key:"albumUrl",value:v});
  if(k==="rates")apiCall("set_config",{key:"rates",value:JSON.stringify(v)});
  if(k==="budgetItems")apiCall("update_budget",{items:v});
}

// ═══ LEAFLET MAP ═══
let mapInst=null,mapCurDay=null;
function buildMap(day){
  // Always destroy old map first
  if(mapInst){try{mapInst.off();mapInst.remove();}catch(e){}mapInst=null;}
  const el=document.getElementById("mapEl");
  if(!el)return;
  // Set height via JS (more reliable than CSS calc)
  // Height is now set by flex:1 in CSS — just ensure Leaflet knows the size
  mapCurDay=day;
  const isAll=day==="all";
  const AS=allSpots();
  const pts=(isAll?AS:(SPOTS[Number(day)]||[]).map(s=>({...s,day:Number(day)}))).filter(s=>s.lat&&s.lng);
  if(!pts.length)return;
  try{
    const map=L.map(el,{zoomControl:true,attributionControl:true});
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OSM",maxZoom:18}).addTo(map);
    function route(arr,col){
      const v=arr.filter(s=>s.lat&&s.lng);
      for(let i=0;i<v.length-1;i++){
        L.polyline([[v[i].lat,v[i].lng],[v[i+1].lat,v[i+1].lng]],{color:col,weight:3.5,dashArray:"7,4",opacity:.85}).addTo(map);
        const ang=Math.atan2(v[i+1].lng-v[i].lng,v[i+1].lat-v[i].lat)*(180/Math.PI);
        const ml=[(v[i].lat+v[i+1].lat)/2,(v[i].lng+v[i+1].lng)/2];
        L.marker(ml,{icon:L.divIcon({className:"",html:`<span style="transform:rotate(${-ang+90}deg);display:block;font-size:16px;color:${col};text-shadow:0 0 3px #fff;line-height:1">▶</span>`,iconSize:[13,13],iconAnchor:[6,6]}),interactive:false}).addTo(map);
      }
    }
    if(isAll){for(let d=1;d<=10;d++)route(AS.filter(s=>s.day===d&&s.lat&&s.lng),DC[d]||"#B8826A");}
    else route(pts,DC[Number(day)]||"#B8826A");
    let sn2=0;
    pts.forEach(sp=>{
      const c=DC[sp.day]||"#B8826A",isH=["T","F","FT"].includes(sp.t);
      if(!isH)sn2++;
      const lbl=isH?({F:"F",T:"T",FT:"F/T"}[sp.t]||"H"):(isAll?`D${sp.day}`:String(sn2));
      const sz=isH?28:24;
      const ic=L.divIcon({className:"",html:`<div style="width:${sz}px;height:${sz}px;background:${isH?c+"99":c};border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${isH?9:10}px;font-weight:700;color:#fff;box-shadow:0 1px 6px rgba(0,0,0,.25)">${lbl}</div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],popupAnchor:[0,-sz/2]});
      const burl=sp.hk?BOOKING[sp.hk]:"";
      L.marker([sp.lat,sp.lng],{icon:ic}).addTo(map).bindPopup(`<div style="font-size:16px;font-family:'DM Sans',sans-serif;min-width:170px"><div style="font-size:10px;color:${c};font-weight:700;margin-bottom:2px">Day${sp.day} ${DM2[sp.day]||""} · ${DT[(sp.day||1)-1]}</div><div style="font-weight:600;font-size:16px;margin-bottom:4px">${sp.nm}</div>${sp.hours?`<div>🕐 ${sp.hours}</div>`:""}${sp.price?`<div style="color:#B8826A;font-weight:600">💰 ${sp.price}</div>`:""}${sp.note?`<div style="color:#7A6A5A;font-size:16px;margin-top:2px">${sp.note}</div>`:""}<div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap">${sp.gmap?`<a href="${sp.gmap}" target="_blank" style="background:#4285F4;color:#fff;padding:4px 10px;border-radius:16px;font-size:16px;font-weight:600;text-decoration:none">Google</a>`:""}${sp.naver?`<a href="${sp.naver}" target="_blank" style="background:#03C75A;color:#fff;padding:4px 10px;border-radius:16px;font-size:16px;font-weight:600;text-decoration:none">Naver</a>`:""}${burl?`<a href="${burl}" target="_blank" style="background:${c};color:#fff;padding:4px 10px;border-radius:16px;font-size:16px;font-weight:600;text-decoration:none">訂單</a>`:""}</div></div>`,{maxWidth:280});
    });
    const bounds=pts.map(s=>[s.lat,s.lng]);
    if(bounds.length)map.fitBounds(bounds,{padding:[44,44],maxZoom:isAll?5:12});
    mapInst=map;
    setTimeout(()=>{try{map.invalidateSize();}catch(e){}},300);
  }catch(e){console.error("Map error:",e);}
}

async function sendAI(){
  const msg=ST.aiIn.trim();if(!msg||ST.aiLoad)return;
  const hist=[...ST.aiHist,{role:"user",content:msg}];
  ST.aiHist=hist;ST.aiIn="";ST.aiLoad=true;render();
  setTimeout(()=>{const c=document.getElementById("chatA");if(c)c.scrollTop=c.scrollHeight;},50);
  try{
    let reply=null;
    // 1st: try Apps Script proxy
    if(ST.apiUrl){
      const r=await apiCall("ask_ai",{messages:hist.map(m=>({role:m.role,content:m.content}))});
      if(r&&r.ok&&r.reply)reply=r.reply;
    }
    // 2nd: try direct Gemini API (user's own key in settings)
    if(!reply)reply=await askGeminiDirect(hist);
    // 3rd: fallback message with useful links
    if(!reply)reply="__NO_AI__";
    ST.aiHist=[...hist,{role:"assistant",content:reply}];
  }catch(e){ST.aiHist=[...hist,{role:"assistant",content:"__NO_AI__"}];}
  ST.aiLoad=false;render();
  setTimeout(()=>{const c=document.getElementById("chatA");if(c)c.scrollTop=c.scrollHeight;},50);
}

  </div>`;
}
function saveBudgetEdit(id){
  const items=getBudgetItems().map(it=>{
    if(it.id!==id)return it;
    const d=ST.budgetDraft;
    return{...it,
      cat:d.cat||it.cat,label:d.label||it.label,
      total:d.total!==undefined?Number(d.total):it.total,
      cur:d.cur||it.cur,ref:d.ref!==undefined?d.ref:it.ref,
      paid:"paid" in d?d.paid:it.paid
    };
  });
  set("budgetItems",items);sn("budgetEditId",null);
}
