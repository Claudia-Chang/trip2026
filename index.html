function App() {
  const w = useW();
  const isMob = w < 1024, isDsk = w >= 1024;
  const sz = { xxl: isDsk ? 28 : 24, xl: isDsk ? 22 : 20, lg: isDsk ? 18 : 17, md: isDsk ? 16 : 15, sm: 14, xs: 13 };
  
  const [tab, setTab] = useState("itin");
  const [expenses, setExpenses] = useState([]);
  const [rates] = useState({ JPY: 0.222, KRW: 0.0233 });

  useEffect(() => {
    fetch(`${API_URL}?sheet=Expenses`).then(res => res.json()).then(data => { if(Array.isArray(data)) setExpenses(data); }).catch(() => {});
  }, [tab]);

  const addExpenseToCloud = (newExp) => {
    setExpenses([newExp, ...expenses]);
    fetch(API_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ sheet: "Expenses", ...newExp }) });
  };

  const NAVS = [
    { id: "itin", icon: "📅", l: "行程" },
    { id: "map", icon: "🗺️", l: "地圖" },
    { id: "accom", icon: "🏨", l: "住宿憑證" },
    { id: "expense", icon: "💰", l: "預算記帳" },
    { id: "more", icon: "🧳", l: "工具" }
